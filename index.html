<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=0.75, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes" />
    <title>Poderalize CRM - Gestão Inteligente</title>
    <script>
      (function() {
        function adjustViewport() {
          const viewport = document.querySelector('meta[name="viewport"]');
          const isLandscape = window.innerWidth > window.innerHeight;
          const isMobile = window.innerWidth <= 768;
          
          if (isMobile && isLandscape) {
            viewport.setAttribute('content', 
              'width=device-width, initial-scale=0.65, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes'
            );
          } else if (isMobile) {
            viewport.setAttribute('content', 
              'width=device-width, initial-scale=0.9, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes'
            );
          } else {
            viewport.setAttribute('content', 
              'width=device-width, initial-scale=1.0, minimum-scale=0.8, maximum-scale=3.0, user-scalable=yes'
            );
          }
        }
        
        adjustViewport();
        window.addEventListener('resize', adjustViewport);
        window.addEventListener('orientationchange', adjustViewport);
      })();
    </script>
    <meta name="description" content="Gerencie colaboradores, projetos e leads com eficiência." />
    <meta name="author" content="Poderalize" />
